<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flag Recall Practice</title>
<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #0b1020;
  color: white;
  padding: 20px;
}
button {
  padding: 12px 16px;
  margin: 8px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}
.primary { background: #7aa7ff; color: black; }
.correct { background: #2ee59d; }
.wrong { background: #ff5c7a; color: white; }
.flag {
  font-size: 90px;
  margin: 20px;
}
.hidden { display:none; }
</style>
</head>
<body>

<h2>🌍 Flag Recall Practice</h2>

<div>
<button class="primary" onclick="setMode('learn')">Learn</button>
<button class="primary" onclick="setMode('quiz')">Quiz</button>
<button class="primary" onclick="setMode('memory')">Memory Round</button>
<button class="primary" onclick="setMode('speed')">Speed</button>
</div>

<div id="mainArea">
<div class="flag" id="flagDisplay">🏳️</div>
<div id="message">Press Next to start</div>
<button class="primary" onclick="nextFlag()">Next</button>
<button onclick="showAnswer()">Show Answer</button>
</div>

<div id="memoryArea" class="hidden">
<div id="memoryMessage"></div>
<div class="flag" id="memoryFlag"></div>
<div id="memoryOptions"></div>
</div>

<script>

// ---------- Country Dictionary ----------
const codes = ["CA","US","IN","JP","GB","AU","CN","BR","FR","DE","IT","ES","MX","ZA","KR","RU","AR","TR","SA","SE"];

function toFlag(code) {
  return code.replace(/./g, c => String.fromCodePoint(127397 + c.charCodeAt()));
}

const countries = new Intl.DisplayNames(['en'], {type:'region'});

let mode = "learn";
let current = "";
let memorySet = [];
let memoryIndex = 0;
let score = 0;

// ---------- Mode Switch ----------
function setMode(m){
  mode = m;
  document.getElementById("memoryArea").classList.add("hidden");
  document.getElementById("mainArea").classList.remove("hidden");
  document.getElementById("message").innerHTML = "Press Next to start";
}

// ---------- Random Flag ----------
function randomCode(){
  return codes[Math.floor(Math.random()*codes.length)];
}

function nextFlag(){
  current = randomCode();
  document.getElementById("flagDisplay").innerHTML = toFlag(current);
  document.getElementById("message").innerHTML = "";
}

function showAnswer(){
  document.getElementById("message").innerHTML = countries.of(current);
}

// ---------- Memory Round ----------
function startMemory(){
  memorySet = [];
  score = 0;
  memoryIndex = 0;

  for(let i=0;i<5;i++){
    memorySet.push(randomCode());
  }

  document.getElementById("mainArea").classList.add("hidden");
  document.getElementById("memoryArea").classList.remove("hidden");

  showMemorySequence();
}

function showMemorySequence(){
  if(memoryIndex < 5){
    document.getElementById("memoryFlag").innerHTML = toFlag(memorySet[memoryIndex]);
    document.getElementById("memoryMessage").innerHTML = "Remember this flag...";
    setTimeout(()=>{
      memoryIndex++;
      showMemorySequence();
    },2000);
  } else {
    askMemoryQuestion();
  }
}

function askMemoryQuestion(){
  document.getElementById("memoryFlag").innerHTML = "";
  document.getElementById("memoryMessage").innerHTML = "Which country was the FIRST flag?";

  let correct = memorySet[0];
  let options = [correct];

  while(options.length<4){
    let r = randomCode();
    if(!options.includes(r)) options.push(r);
  }

  options.sort(()=>Math.random()-0.5);

  let html="";
  options.forEach(o=>{
    html+= `<button onclick="checkMemory('${o}')">${countries.of(o)}</button>`;
  });

  document.getElementById("memoryOptions").innerHTML = html;
}

function checkMemory(choice){
  if(choice === memorySet[0]){
    score++;
    document.getElementById("memoryMessage").innerHTML = "✅ Correct!";
  } else {
    document.getElementById("memoryMessage").innerHTML = "❌ Wrong! It was "+countries.of(memorySet[0]);
  }

  setTimeout(()=>{
    document.getElementById("memoryOptions").innerHTML = "";
    document.getElementById("memoryMessage").innerHTML = "Score: "+score+"/1";
    document.getElementById("mainArea").classList.remove("hidden");
    document.getElementById("memoryArea").classList.add("hidden");
  },2000);
}

// Hook memory mode button
document.querySelector("button[onclick=\"setMode('memory')\"]").onclick = startMemory;

</script>

</body>
</html>
