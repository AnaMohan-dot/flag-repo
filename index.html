<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Flag Recall Practice - Grade 1</title>

<style>
body{
  margin:0;
  font-family:-apple-system,system-ui,Segoe UI,Roboto;
  background:#0b1020;
  color:white;
  text-align:center;
  padding:20px;
}
button{
  padding:12px 16px;
  margin:6px;
  border-radius:12px;
  border:none;
  font-weight:bold;
  cursor:pointer;
}
.primary{ background:#7aa7ff; color:black; }
.correct{ background:#2ee59d; }
.wrong{ background:#ff5c7a; color:white; }
.flag{
  font-size:100px;
  margin:20px;
}
.options{
  display:grid;
  gap:10px;
  max-width:400px;
  margin:auto;
}
.hidden{ display:none; }
</style>
</head>

<body>

<h2>🌍 Flag Recall Practice (Grade 1)</h2>

<div>
<button onclick="setMode('learn')" class="primary">Learn</button>
<button onclick="setMode('quiz')" class="primary">Quiz</button>
<button onclick="setMode('memory')" class="primary">Memory Round</button>
<button onclick="setMode('speed')" class="primary">Speed</button>
</div>

<div id="flagArea">
<div class="flag" id="flag">🏳️</div>
<div id="message">Press Next to start</div>
</div>

<div id="learnControls">
<button class="primary" onclick="nextFlag()">Next</button>
<button onclick="showAnswer()">Show Answer</button>
</div>

<div id="quizControls" class="hidden">
<div class="options" id="quizOptions"></div>
</div>

<div id="memoryControls" class="hidden">
<div id="memoryMessage"></div>
<div class="options" id="memoryOptions"></div>
</div>

<div id="speedControls" class="hidden">
<div>Time: <span id="timer">0</span>s</div>
<div>Score: <span id="score">0</span>/10</div>
<div class="options" id="speedOptions"></div>
</div>

<script>

// ===== Grade 1 Official Country List =====
const COUNTRY_CODES = `
ML,MV,FR,BR,AU,
AT,AR,BD,CA,DK,
CU,CN,GR,DE,AO,
IE,IS,LY,NZ,MM,
IN,HU,GY,KI,MY,
LR,BI,BT,TD,CV,
KH,BN,BA,GE,FI,
FJ,FM,EG,JO,IT,
IL,IQ,KE,KZ,MW,
LA,KW,KR,KP,NG,
NL,MA,PK,MN,NO,
NP,WS,RW,RU,QA,
SE,SD,SA,UA,TR,
LK,SO,US,TG,TW
`.replace(/\s+/g,"").split(",").filter(Boolean);

const dn = new Intl.DisplayNames(["en"], {type:"region"});

function flagEmoji(code){
  return code.toUpperCase()
  .replace(/./g, c => String.fromCodePoint(127397 + c.charCodeAt()));
}

const FLAGS = COUNTRY_CODES.map(c=>({
  code:c,
  emoji:flagEmoji(c),
  name:dn.of(c)
}));

let mode="learn";
let current=null;
let memorySet=[];
let timerInterval;
let speedCount=0;
let speedScore=0;

// ===== Mode Switching =====
function setMode(m){
  mode=m;
  document.getElementById("quizControls").classList.add("hidden");
  document.getElementById("memoryControls").classList.add("hidden");
  document.getElementById("speedControls").classList.add("hidden");
  document.getElementById("learnControls").classList.add("hidden");
  document.getElementById("message").innerHTML="";

  if(mode==="learn"){
    document.getElementById("learnControls").classList.remove("hidden");
  }
  if(mode==="quiz"){
    document.getElementById("quizControls").classList.remove("hidden");
    newQuiz();
  }
  if(mode==="memory"){
    document.getElementById("memoryControls").classList.remove("hidden");
    startMemory();
  }
  if(mode==="speed"){
    document.getElementById("speedControls").classList.remove("hidden");
    startSpeed();
  }
}

// ===== Random Flag =====
function randomFlag(){
  return FLAGS[Math.floor(Math.random()*FLAGS.length)];
}

function nextFlag(){
  current=randomFlag();
  document.getElementById("flag").innerHTML=current.emoji;
}

function showAnswer(){
  document.getElementById("message").innerHTML=current.name;
}

// ===== Quiz Mode =====
function newQuiz(){
  current=randomFlag();
  document.getElementById("flag").innerHTML=current.emoji;
  const options=[current];
  while(options.length<4){
    let r=randomFlag();
    if(!options.includes(r)) options.push(r);
  }
  options.sort(()=>Math.random()-0.5);
  const container=document.getElementById("quizOptions");
  container.innerHTML="";
  options.forEach(o=>{
    const b=document.createElement("button");
    b.textContent=o.name;
    b.onclick=()=>{
      if(o.code===current.code){
        document.getElementById("message").innerHTML="✅ Correct!";
      } else {
        document.getElementById("message").innerHTML="❌ Correct: "+current.name;
      }
      setTimeout(newQuiz,1000);
    };
    container.appendChild(b);
  });
}

// ===== Memory Round =====
function startMemory(){
  memorySet=[];
  for(let i=0;i<5;i++){
    memorySet.push(randomFlag());
  }
  let i=0;
  function showNext(){
    if(i<5){
      document.getElementById("flag").innerHTML=memorySet[i].emoji;
      i++;
      setTimeout(showNext,1200);
    } else {
      askMemory();
    }
  }
  showNext();
}

function askMemory(){
  document.getElementById("flag").innerHTML="";
  document.getElementById("memoryMessage").innerHTML="What was the FIRST flag?";
  const correct=memorySet[0];
  const options=[correct];
  while(options.length<4){
    let r=randomFlag();
    if(!options.includes(r)) options.push(r);
  }
  options.sort(()=>Math.random()-0.5);
  const container=document.getElementById("memoryOptions");
  container.innerHTML="";
  options.forEach(o=>{
    const b=document.createElement("button");
    b.textContent=o.name;
    b.onclick=()=>{
      if(o.code===correct.code){
        container.innerHTML="✅ Correct!";
      } else {
        container.innerHTML="❌ Correct: "+correct.name;
      }
    };
    container.appendChild(b);
  });
}

// ===== Speed Mode =====
function startSpeed(){
  speedCount=0;
  speedScore=0;
  document.getElementById("score").innerText="0";
  document.getElementById("timer").innerText="0";
  let start=Date.now();
  timerInterval=setInterval(()=>{
    document.getElementById("timer").innerText=
    Math.floor((Date.now()-start)/1000);
  },1000);
  nextSpeed();
}

function nextSpeed(){
  if(speedCount>=10){
    clearInterval(timerInterval);
    document.getElementById("message").innerHTML="Speed Round Complete!";
    return;
  }
  current=randomFlag();
  document.getElementById("flag").innerHTML=current.emoji;
  const options=[current];
  while(options.length<4){
    let r=randomFlag();
    if(!options.includes(r)) options.push(r);
  }
  options.sort(()=>Math.random()-0.5);
  const container=document.getElementById("speedOptions");
  container.innerHTML="";
  options.forEach(o=>{
    const b=document.createElement("button");
    b.textContent=o.name;
    b.onclick=()=>{
      if(o.code===current.code){
        speedScore++;
      }
      speedCount++;
      document.getElementById("score").innerText=speedScore;
      nextSpeed();
    };
    container.appendChild(b);
  });
}

</script>
</body>
</html>
